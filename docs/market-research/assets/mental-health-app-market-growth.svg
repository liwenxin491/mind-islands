<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640" role="img" aria-labelledby="title desc">
  <title id="title">Mental health apps market growth</title>
  <desc id="desc">Projected growth from 2025 to 2030 based on a 2025 market size of 9.94 billion dollars and 18 percent CAGR.</desc>
  <rect width="1100" height="640" fill="#f7f4ee" />
  <rect x="70" y="60" width="960" height="500" rx="24" fill="#fffdf8" stroke="#e8dcc9" />
  <text x="110" y="125" fill="#1f2937" font-size="34" font-family="Arial, Helvetica, sans-serif" font-weight="700">
    Mental Health Apps Market Growth
  </text>
  <text x="110" y="160" fill="#6b7280" font-size="20" font-family="Arial, Helvetica, sans-serif">
    2025-2030 projection using MarketsandMarkets 2025 baseline and 18.0% CAGR
  </text>

  <line x1="130" y1="500" x2="980" y2="500" stroke="#7c6f64" stroke-width="2" />
  <line x1="130" y1="220" x2="130" y2="500" stroke="#7c6f64" stroke-width="2" />

  <g fill="#8b5cf6" font-family="Arial, Helvetica, sans-serif" font-size="16">
    <line x1="130" y1="500" x2="980" y2="500" stroke="#d6cfc4" stroke-width="1" />
    <line x1="130" y1="430" x2="980" y2="430" stroke="#ece6dc" stroke-width="1" />
    <line x1="130" y1="360" x2="980" y2="360" stroke="#ece6dc" stroke-width="1" />
    <line x1="130" y1="290" x2="980" y2="290" stroke="#ece6dc" stroke-width="1" />
    <line x1="130" y1="220" x2="980" y2="220" stroke="#ece6dc" stroke-width="1" />
  </g>

  <g fill="#6b7280" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="end">
    <text x="118" y="505">$0B</text>
    <text x="118" y="435">$5B</text>
    <text x="118" y="365">$10B</text>
    <text x="118" y="295">$15B</text>
    <text x="118" y="225">$20B</text>
  </g>

  <polyline
    fill="none"
    stroke="#2563eb"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    points="180,361 340,333 500,304 660,269 820,227 960,182"
  />

  <g fill="#2563eb">
    <circle cx="180" cy="361" r="8" />
    <circle cx="340" cy="333" r="8" />
    <circle cx="500" cy="304" r="8" />
    <circle cx="660" cy="269" r="8" />
    <circle cx="820" cy="227" r="8" />
    <circle cx="960" cy="182" r="8" />
  </g>

  <g fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">
    <text x="180" y="530">2025</text>
    <text x="340" y="530">2026</text>
    <text x="500" y="530">2027</text>
    <text x="660" y="530">2028</text>
    <text x="820" y="530">2029</text>
    <text x="960" y="530">2030</text>
  </g>

  <g fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    <text x="180" y="340">$9.94B</text>
    <text x="340" y="312">$11.73B</text>
    <text x="500" y="283">$13.84B</text>
    <text x="660" y="248">$16.33B</text>
    <text x="820" y="206">$19.27B</text>
    <text x="960" y="161">$22.73B</text>
  </g>

  <text x="110" y="590" fill="#6b7280" font-size="17" font-family="Arial, Helvetica, sans-serif">
    Note: 2026-2029 values are inferred from the reported 2025 baseline and 18.0% CAGR. 2030 is source-reported.
  </text>
</svg>
